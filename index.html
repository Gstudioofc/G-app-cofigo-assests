  if (window.playablesSDK) return;

  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';

      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }

    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

    errorSent = true;

      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,

    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),

      errorSent = true;

        auto_captured: false

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G Asset Saver by Gstudioofc</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#05030a;
  --bg2:#0c0718;
  --surface:#131024;
  --surface-2:#1a1430;
  --surface-3:#211938;
  --border:#2d2250;
  --border-2:#3a2c66;
  --text:#f0ecfa;
  --muted:#9a8cc0;
  --purple:#7c3aed;
  --purple-2:#5b21b6;
  --purple-3:#4c1d95;
  --accent:#a78bfa;
  --success:#22c55e;
  --danger:#ef4444;
  --shadow:0 20px 50px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.4);
  --glow:0 0 40px rgba(124,58,237,.25);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,sans-serif;
  background:
    radial-gradient(1200px 800px at 80% -20%, rgba(124,58,237,.20) 0%, transparent 60%),
    radial-gradient(900px 600px at -10% 10%, rgba(76,29,149,.25) 0%, transparent 55%),
    radial-gradient(700px 500px at 50% 120%, rgba(167,139,250,.15) 0%, transparent 50%),
    var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  -webkit-font-smoothing:antialiased;
}
.app{width:100%;max-width:1120px;margin:0 auto;padding:24px 16px 40px;flex:1;display:flex;flex-direction:column;gap:22px}
header{
  display:flex;align-items:center;gap:16px;
  padding:16px 20px;
  background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
  border:1px solid var(--border);
  border-radius:20px;
  backdrop-filter:blur(16px) saturate(1.2);
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}
header::before{
  content:"";position:absolute;inset:-1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.15),transparent);
  transform:translateX(-100%);animation:shine 8s infinite;
}
@keyframes shine{0%{transform:translateX(-100%)}60%,100%{transform:translateX(200%)}}
.logo-wrap{
  width:46px;height:46px;flex:0 0 46px;
  background:linear-gradient(145deg, #1c1333, #0f0a1f);
  border:1px solid var(--border-2);
  border-radius:14px;
  display:grid;place-items:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05), var(--glow);
}
.logo{width:30px;height:30px;filter:drop-shadow(0 4px 14px rgba(124,58,237,.5))}
.head-text{display:flex;flex-direction:column}
.head-title{font-size:19px;font-weight:700;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
.head-title span.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:999px;background:linear-gradient(135deg,var(--purple),var(--purple-2));text-transform:uppercase;letter-spacing:.5px;box-shadow:0 2px 10px rgba(124,58,237,.4)}
.head-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.head-sub strong{color:var(--accent);font-weight:600}

.search-section{
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
  border:1px solid var(--border);
  border-radius:22px;
  padding:24px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
}
.search-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.search-head h2{margin:0;font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.search-head p{margin:0;font-size:12.5px;color:var(--muted)}
.search-box{display:flex;gap:10px;position:relative}
.search-box input{
  flex:1;background:var(--bg2);border:1.5px solid var(--border);
  color:var(--text);padding:15px 16px 15px 44px;border-radius:14px;
  font-size:15px;outline:none;transition:.2s;
}
.search-box input::placeholder{color:#6e6292}
.search-box input:focus{border-color:var(--purple);box-shadow:0 0 0 4px rgba(124,58,237,.18);background:#0e0820}
.search-box .icon-left{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#6b5a95;pointer-events:none}
.search-box button{
  background:linear-gradient(135deg, var(--purple), var(--purple-2));
  border:none;color:white;padding:0 20px;border-radius:13px;font-weight:600;font-size:14.5px;
  cursor:pointer;display:flex;align-items:center;gap:8px;transition:.2s;white-space:nowrap;
  box-shadow:0 8px 24px rgba(124,58,237,.35), inset 0 1px 0 rgba(255,255,255,.15);
  height:50px;
}
.search-box button:hover{transform:translateY(-1px);box-shadow:0 12px 30px rgba(124,58,237,.45), inset 0 1px 0 rgba(255,255,255,.15)}
.search-box button:active{transform:translateY(0)}
.search-box button:disabled{opacity:.6;cursor:not-allowed;transform:none}
.history{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.history-label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:4px;align-self:center}
.history button{
  background:var(--surface-2);border:1px solid var(--border);color:#b8add6;
  padding:6px 12px;border-radius:999px;font-size:12.5px;cursor:pointer;transition:.2s;
  display:flex;align-items:center;gap:6px;
}
.history button:hover{color:var(--text);border-color:var(--purple-2);background:rgba(124,58,237,.12);transform:translateY(-1px)}

#results{
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
  border:1px solid var(--border);
  border-radius:22px;
  overflow:hidden;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  animation:fadeIn .4s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tabs{display:flex;gap:4px;padding:8px 8px 0;background:var(--surface-2);border-bottom:1px solid var(--border);overflow:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{
  background:transparent;border:none;color:var(--muted);padding:11px 16px;cursor:pointer;
  border-radius:10px 10px 0 0;font-weight:500;font-size:14px;display:flex;align-items:center;gap:8px;
  white-space:nowrap;position:relative;transition:.2s;border-bottom:2px solid transparent;
}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}
.tab-btn.active{color:white;background:var(--surface);border-bottom-color:var(--accent);box-shadow:0 -4px 12px rgba(0,0,0,.2)}
.tab-btn .count{
  background:rgba(255,255,255,.08);padding:2px 7px;border-radius:999px;font-size:11px;color:var(--muted);
  min-width:22px;text-align:center;font-weight:600;
}
.tab-btn.active .count{background:linear-gradient(135deg,var(--purple),var(--purple-2));color:white}

.toolbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);
  gap:12px;flex-wrap:wrap;
}
.toolbar .left,.toolbar .right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.toolbar .info{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
.toolbar .info strong{color:var(--accent)}
.btn{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  padding:8px 13px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;gap:7px;transition:.18s;white-space:nowrap;
}
.btn:hover{border-color:var(--purple-2);background:rgba(124,58,237,.13);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.primary{
  background:linear-gradient(135deg, var(--purple), var(--purple-2));
  border:none;box-shadow:0 6px 18px rgba(124,58,237,.3), inset 0 1px 0 rgba(255,255,255,.12);
}
.btn.primary:hover{box-shadow:0 8px 24px rgba(124,58,237,.4), inset 0 1px 0 rgba(255,255,255,.12)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.asset-list{max-height:58vh;overflow:auto;padding:10px;background:radial-gradient(800px 200px at 50% 0%, rgba(124,58,237,.06), transparent 70%)}
.asset-list::-webkit-scrollbar{width:10px}
.asset-list::-webkit-scrollbar-track{background:transparent}
.asset-list::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:20px;border:2px solid var(--surface)}
.asset-list::-webkit-scrollbar-thumb:hover{background:#2e2352}
.asset{
  display:grid;grid-template-columns:auto 60px 1fr auto;gap:14px;align-items:center;
  padding:10px 12px;border-radius:14px;transition:.18s;border:1px solid transparent;
  margin-bottom:6px;background:rgba(255,255,255,.01);
}
.asset:hover{background:rgba(255,255,255,.035);border-color:var(--border);transform:translateX(2px)}
.asset .check{width:22px;height:22px;display:grid;place-items:center}
.asset .check input{width:18px;height:18px;accent-color:var(--purple);cursor:pointer}
.asset .thumb{
  width:60px;height:60px;border-radius:10px;background:var(--bg2);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);position:relative;flex:0 0 60px;
}
.asset .thumb img{width:100%;height:100%;object-fit:cover;display:block}
.asset .thumb .icon{color:#7c6ba8}
.asset .thumb::after{
  content:"";position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);border-radius:10px;pointer-events:none;
}
.asset .meta{min-width:0}
.asset .name{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.asset .url{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;font-family:ui-monospace, SFMono-Regular, Menlo, monospace}
.asset .dl-one{
  background:var(--surface-2);border:1px solid var(--border);color:var(--muted);
  width:34px;height:34px;border-radius:9px;display:grid;place-items:center;cursor:pointer;transition:.18s;flex:0 0 34px;
}
.asset .dl-one:hover{color:white;border-color:var(--purple);background:rgba(124,58,237,.2);transform:scale(1.05)}

.empty-state{padding:70px 20px;text-align:center;color:var(--muted)}
.empty-state svg{opacity:.5;margin-bottom:14px}
.empty-state h3{margin:8px 0 6px;color:#d4cbe9;font-weight:600}
.empty-state p{margin:0;font-size:13.5px;max-width:360px;margin-inline:auto;line-height:1.5}

.progress-overlay{
  position:fixed;inset:0;background:rgba(4,1,12,.85);backdrop-filter:blur(10px) saturate(1.1);
  display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;
}
.progress-overlay[hidden]{display:none}
.progress-card{
  background:linear-gradient(180deg, var(--surface), var(--surface-2));
  border:1px solid var(--border-2);padding:32px 28px;border-radius:22px;width:100%;max-width:400px;
  text-align:center;box-shadow:var(--shadow), var(--glow);animation:pop .3s ease;
}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.spinner{width:48px;height:48px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 18px;box-shadow:0 0 20px rgba(167,139,250,.3)}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-title{font-weight:600;font-size:16px;margin-bottom:6px}
.progress-text{font-size:13.5px;color:var(--muted);min-height:20px}
.bar{height:10px;background:var(--bg2);border-radius:999px;overflow:hidden;margin-top:18px;border:1px solid var(--border);position:relative}
.bar div{height:100%;width:0%;background:linear-gradient(90deg,var(--purple-2),var(--accent),var(--purple));transition:width .25s ease;box-shadow:0 0 16px rgba(124,58,237,.5)}

footer{margin-top:auto;text-align:center;padding:28px 16px 20px;color:#7a6a9e;font-size:13px}
footer a{color:var(--accent);text-decoration:none;font-weight:500}
footer a:hover{text-decoration:underline}

.spin{animation:spin 1s linear infinite}

/* Mobile */
@media (max-width:780px){
  .app{padding:16px 12px 30px;gap:16px}
  header{padding:14px 16px;border-radius:16px}
  .search-section{padding:18px;border-radius:18px}
  .search-box{flex-direction:column}
  .search-box button{width:100%;justify-content:center;height:46px}
  .search-box input{padding-left:42px}
  .toolbar{flex-direction:column;align-items:stretch;padding:12px}
  .toolbar .left,.toolbar .right{justify-content:space-between;width:100%}
  .asset{grid-template-columns:auto 48px 1fr auto;gap:10px;padding:9px 10px}
  .asset .thumb{width:48px;height:48px;flex:0 0 48px}
  .asset:hover{transform:none}
  #results{border-radius:18px}
  .asset-list{max-height:55vh}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-wrap" aria-hidden="true">
      <svg class="logo" viewBox="0 0 48 48" fill="none">
        <defs>
          <linearGradient id="ggrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
            <stop stop-color="#d8b4fe"/>

            <stop stop-color="#a78bfa" stop-opacity=".9"/>
            <stop offset="1" stop-color="#7c3aed" stop-opacity=".2"/>
          </linearGradient>
        </defs>
        <rect x="1.5" y="1.5" width="45" height="45" rx="12" fill="#0e0820" stroke="url(#ggrad2)" stroke-opacity=".5"/>

      </svg>
    </div>
    <div class="head-text">
      <div class="head-title">G Asset Saver <span class="badge">by Gstudioofc</span></div>
      <div class="head-sub">Salve <strong>imagens, CSS, JS e mídias</strong> de qualquer site em 1 clique</div>
    </div>
  </header>

  <section class="search-section">
    <div class="search-head">
      <h2>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.9 5.8H4l4.9 3.6L7 18l5-3.6L17 18l-1.9-5.6L20 8.8h-6.1L12 3z"/></svg>
        Buscar Assets
      </h2>
      <p>Use URL completa. Bypass CORS via AllOrigins.</p>
    </div>

      <input id="urlInput" type="url" placeholder="https://exemplo.com" autocomplete="url" spellcheck="false">
      <button id="searchBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        Buscar Assets
      </button>
    </div>
    <div class="history" id="history" style="display:none">
      <span class="history-label">Recentes:</span>
    </div>
  </section>

  <section id="results" hidden>
    <div class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="imagens" role="tab">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>

      </button>
      <button class="tab-btn" data-tab="css" role="tab">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M5 20h14a2 2 0 0 0 2-2V9H3v9a2 2 0 0 0 2 2Z"/><path d="M9 14h6"/></svg>
        CSS <span class="count">0</span>
      </button>
      <button class="tab-btn" data-tab="js" role="tab">

        JS <span class="count">0</span>
      </button>
      <button class="tab-btn" data-tab="outros" role="tab">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18"/><rect x="3" y="8" width="6" height="8" rx="1"/><rect x="15" y="5" width="6" height="14" rx="1"/></svg>
        Outros <span class="count">0</span>
      </button>
    </div>
    <div class="toolbar">
      <div class="left">
        <button class="btn" id="selectAll">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Selecionar todos
        </button>
        <div class="info">Total: <strong id="countAll">0</strong> assets</div>
      </div>
      <div class="right">
        <button class="btn" id="downloadSel">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          Baixar selecionados
        </button>
        <button class="btn primary" id="downloadAll">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M3 21h18"/></svg>
          Baixar tudo
        </button>
      </div>
    </div>
    <div class="asset-list" id="assetList"></div>
  </section>
</div>

<footer>G Asset Saver © <a href="https://gstudioofc.github.io" target="_blank" rel="noopener">Gstudioofc</a> — feito com 💜</footer>

<div id="progressOverlay" class="progress-overlay" hidden>
  <div class="progress-card">
    <div class="spinner"></div>
    <div class="progress-title">Baixando Assets</div>
    <div class="progress-text" id="progressText">Preparando...</div>
    <div class="bar"><div id="progressBar"></div></div>
  </div>
</div>

<script>
(() => {
  const $ = s => document.querySelector(s);
  const urlInput = $('#urlInput');
  const searchBtn = $('#searchBtn');
  const historyEl = $('#history');
  const results = $('#results');
  const assetList = $('#assetList');
  const tabBtns = document.querySelectorAll('.tab-btn');
  const selectAllBtn = $('#selectAll');
  const downloadSelBtn = $('#downloadSel');
  const downloadAllBtn = $('#downloadAll');
  const progressOverlay = $('#progressOverlay');
  const progressBar = $('#progressBar');
  const progressText = $('#progressText');
  const countAll = $('#countAll');

  const state = { assets:[], currentTab:'imagens', url:'' };

  const tabFilters = {
    imagens: a => a.type === 'image',
    css: a => a.type === 'css',
    js: a => a.type === 'js',
    outros: a => ['video','audio'].includes(a.type)
  };

  renderHistory();
  urlInput.addEventListener('keydown', e=>{ if(e.key==='Enter') handleSearch(); });
  searchBtn.addEventListener('click', ()=>handleSearch());
  tabBtns.forEach(b=>b.addEventListener('click', ()=>switchTab(b.dataset.tab)));
  selectAllBtn.addEventListener('click', toggleSelectAll);
  downloadSelBtn.addEventListener('click', downloadSelected);
  downloadAllBtn.addEventListener('click', ()=>downloadList(state.assets));

  function resolveUrl(url, base){ try{ return new URL(url, base).href }catch{ return null } }
  function getFileName(url){
    try{
      const u=new URL(url);
      let n=decodeURIComponent(u.pathname.split('/').pop().split('?')[0]||'');
      if(!n || n.length>120) n='asset-'+Math.random().toString(36).slice(2,8);
      if(!n.includes('.')) n+='.bin';
      return n;
    }catch{ return 'asset.bin' }
  }
  function extractUrlsFromCss(css){ const urls=[]; const re=/url\(\s*['"]?([^'")]+)['"]?\s*\)/gi; let m; while((m=re.exec(css))) urls.push(m[1]); return urls }
  function trimUrl(u,max=70){ return u.length>max?u.slice(0,max-1)+'…':u }

  async function fetchViaProxy(url){
    const api='https://api.allorigins.win/raw?url='+encodeURIComponent(url);
    const res=await fetch(api);
    if(!res.ok) throw new Error('HTTP '+res.status);
    return await res.text();
  }

  function extractAssets(doc, baseUrl){
    const assets=[]; const seen=new Set();
    const add=(url,type,meta={})=>{
      if(!url||url.startsWith('data:')||url.startsWith('blob:')||url.startsWith('javascript:')||url.startsWith('#')) return;
      const abs=resolveUrl(url,baseUrl); if(!abs||seen.has(abs)) return; seen.add(abs);
      assets.push({ id:(crypto.randomUUID&&crypto.randomUUID())||Math.random().toString(36).slice(2), url:abs, type, name:getFileName(abs), ...meta });
    };
    doc.querySelectorAll('img[src]').forEach(e=>add(e.getAttribute('src'),'image'));
    doc.querySelectorAll('img[srcset]').forEach(e=>e.getAttribute('srcset').split(',').forEach(p=>add(p.trim().split(' ')[0],'image')));
    doc.querySelectorAll('picture source[srcset]').forEach(e=>e.getAttribute('srcset').split(',').forEach(p=>add(p.trim().split(' ')[0],'image')));
    doc.querySelectorAll('video[src]').forEach(e=>add(e.src,'video'));
    doc.querySelectorAll('video[poster]').forEach(e=>add(e.poster,'image'));
    doc.querySelectorAll('source[src]').forEach(e=>{ const p=e.closest('video,audio'); add(e.src, p?p.tagName.toLowerCase():'video'); });
    doc.querySelectorAll('link[rel="stylesheet"][href]').forEach(e=>add(e.href,'css'));
    doc.querySelectorAll('script[src]').forEach(e=>add(e.src,'js'));
    doc.querySelectorAll('link[rel*="icon"][href],link[rel="apple-touch-icon"][href],link[rel="apple-touch-icon-precomposed"][href]').forEach(e=>add(e.href,'image'));
    doc.querySelectorAll('[style]').forEach(e=>extractUrlsFromCss(e.getAttribute('style')||'').forEach(u=>add(u,'image')));
    doc.querySelectorAll('style').forEach(s=>extractUrlsFromCss(s.textContent||'').forEach(u=>add(u,'image')));
    doc.querySelectorAll('audio[src]').forEach(e=>add(e.src,'audio'));
    return assets;
  }

  async function handleSearch(prefill){
    let url=(prefill||urlInput.value||'').trim();
    if(!url) return;
    if(!/^https?:\/\//i.test(url)) url='https://'+url;
    urlInput.value=url;
    searchBtn.disabled=true;
    searchBtn.innerHTML=`<svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Buscando...`;
    results.hidden=true;
    try{
      const html=await fetchViaProxy(url);
      const doc=new DOMParser().parseFromString(html,'text/html');
      state.url=url;
      state.assets=extractAssets(doc,url);
      saveHistory(url);
      renderTabsCount();
      switchTab('imagens');
      results.hidden=false;
      assetList.scrollTop=0;
    }catch(err){
      alert('Erro ao buscar assets. Verifique a URL e tente novamente.\n'+err.message);
    }finally{
      searchBtn.disabled=false;
      searchBtn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg> Buscar Assets`;
    }
  }

  function renderTabsCount(){
    tabBtns.forEach(btn=>{
      const tab=btn.dataset.tab;
      const count=state.assets.filter(tabFilters[tab]||(()=>false)).length;
      btn.querySelector('.count').textContent=count;
    });
    countAll.textContent=state.assets.length;
  }

  function switchTab(tab){
    state.currentTab=tab;
    tabBtns.forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
    renderAssets();
  }

  function iconFor(type){
    const map={
      image:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>`,
      css:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>`,
      js:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="M14.5 4 9 20"/></svg>`,
      video:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="m22 8-5 4 5 4V8z"/></svg>`,
      audio:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`
    };
    return map[type]||map.image;
  }

  function renderAssets(){
    const filter=tabFilters[state.currentTab];
    const list=state.assets.filter(filter);
    assetList.innerHTML='';
    if(!list.length){
      assetList.innerHTML=`<div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        <h3>Nada por aqui</h3><p>Nenhum asset encontrado nesta categoria para esta página.</p>
      </div>`;
      updateSelectAllLabel();
      return;
    }
    const frag=document.createDocumentFragment();
    list.forEach(asset=>{
      const el=document.createElement('div');
      el.className='asset';
      el.innerHTML=`
        <label class="check"><input type="checkbox" data-id="${asset.id}" checked></label>
        <div class="thumb">${asset.type==='image'?`<img src="${asset.url}" loading="lazy" referrerpolicy="no-referrer" onerror="this.onerror=null;this.src='https://api.allorigins.win/raw?url=${encodeURIComponent(asset.url)}'">`:`<div class="icon">${iconFor(asset.type)}</div>`}</div>
        <div class="meta">
          <div class="name" title="${asset.name}">${asset.name}</div>
          <div class="url" title="${asset.url}">${trimUrl(asset.url)}</div>
        </div>
        <button class="dl-one" data-id="${asset.id}" title="Baixar individual">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        </button>`;
      frag.appendChild(el);
    });
    assetList.appendChild(frag);
    assetList.querySelectorAll('.dl-one').forEach(b=>b.addEventListener('click',()=>{
      const a=state.assets.find(x=>x.id===b.dataset.id);
      if(a) downloadList([a]);
    }));
    updateSelectAllLabel();
  }

  function toggleSelectAll(){
    const checks=[...assetList.querySelectorAll('input[type=checkbox]')];
    const allChecked=checks.length&&checks.every(c=>c.checked);
    checks.forEach(c=>c.checked=!allChecked);
    updateSelectAllLabel();
  }
  function updateSelectAllLabel(){
    const checks=[...assetList.querySelectorAll('input[type=checkbox]')];
    const sel=checks.filter(c=>c.checked).length;
    selectAllBtn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> ${sel && sel!==checks.length ? `Desmarcar (${sel})` : checks.length && sel===checks.length ? 'Desmarcar todos' : 'Selecionar todos'}`;
  }
  assetList.addEventListener('change', e=>{ if(e.target.matches('input[type=checkbox]')) updateSelectAllLabel(); });

  function getSelected(){ const ids=[...assetList.querySelectorAll('input:checked')].map(i=>i.dataset.id); return state.assets.filter(a=>ids.includes(a.id)); }
  function downloadSelected(){ const sel=getSelected(); if(!sel.length) return alert('Selecione pelo menos um asset.'); downloadList(sel); }

  function openProgress(){ progressOverlay.hidden=false; setProgress(0); progressText.textContent='Preparando...'; }
  function closeProgress(){ progressOverlay.hidden=true; }
  function setProgress(p){ progressBar.style.width=Math.max(0,Math.min(100,p))+'%'; }
  function updateProgressText(t){ progressText.textContent=t; }

  async function downloadList(assets){
    if(!window.JSZip) return alert('JSZip não carregado');
    if(!assets.length) return;
    openProgress();
    const zip=new JSZip();
    let done=0;
    const domain=(()=>{ try{return new URL(state.url).hostname.replace(/^www\./,'')}catch{return 'site'} })();
    for(const asset of assets){
      updateProgressText(`Baixando ${done+1}/${assets.length} • ${asset.name}`);
      setProgress((done/assets.length)*75);
      try{
        const proxy='https://api.allorigins.win/raw?url='+encodeURIComponent(asset.url);
        const res=await fetch(proxy);
        if(!res.ok) throw new Error();
        const blob=await res.blob();
        const folder=zip.folder(asset.type+'s');
        let name=asset.name;
        if(name.endsWith('.bin') && blob.type && blob.type!=='application/octet-stream'){
          const ext=blob.type.split('/')[1].split(';')[0];
          if(ext) name=name.replace('.bin','.'+ext);
        }
        let c=1; const base=name.replace(/\.[^.]+$/,''); const ext=name.match(/\.[^.]+$/)?.[0]||'';
        while(folder.file(name)){ name=`${base}-${c}${ext}`; c++; }
        folder.file(name, blob);
      }catch(e){ console.warn('fail', asset.url); }
      done++;
    }
    updateProgressText('Gerando ZIP...');
    setProgress(85);
    const zipBlob=await zip.generateAsync({type:'blob'}, meta=>{ setProgress(80+meta.percent*0.19); });
    setProgress(100);
    updateProgressText('Pronto! Iniciando download...');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(zipBlob);
    a.download=`g-assets-${domain}-${Date.now()}.zip`;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); closeProgress(); }, 900);
  }

  function saveHistory(url){
    try{
      let h=JSON.parse(localStorage.getItem('gasset_history')||'[]');
      h=h.filter(u=>u!==url); h.unshift(url); h=h.slice(0,5);
      localStorage.setItem('gasset_history',JSON.stringify(h));
      renderHistory();
    }catch{}
  }
  function renderHistory(){
    try{
      const h=JSON.parse(localStorage.getItem('gasset_history')||'[]');
      historyEl.innerHTML='<span class="history-label">Recentes:</span>';
      if(!h.length){ historyEl.style.display='none'; return }
      historyEl.style.display='flex';
      h.forEach(u=>{
        const btn=document.createElement('button');
        try{ btn.textContent=new URL(u).hostname.replace(/^www\./,''); }catch{ btn.textContent=u }
        btn.title=u;
        btn.onclick=()=>handleSearch(u);
        btn.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0"/><path d="M12 7v5l3 3"/></svg> ${btn.textContent}`;
        historyEl.appendChild(btn);
      });
    }catch{}
  }

  // demo placeholder
  if(!localStorage.getItem('gasset_history')){
    urlInput.placeholder='https://gstudioofc.github.io';
  }
})();
</script>
</body>
</html>
